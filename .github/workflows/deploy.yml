name: Deploy para GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build
        env:
          VITE_BASE_URL:           /${{ github.event.repository.name }}/
          VITE_GA_ID:              ${{ vars.VITE_GA_ID }}
          VITE_APPS_SCRIPT_URL:    ${{ vars.VITE_APPS_SCRIPT_URL }}
          VITE_FORM_ERRO_URL:      ${{ vars.VITE_FORM_ERRO_URL }}
          VITE_FORM_FEEDBACK_URL:  ${{ vars.VITE_FORM_FEEDBACK_URL }}
        run: npm run build

      # Copiar index.html como 404.html resolve o problema de SPA routing
      # (acesso direto a /quiz ou /resultado via URL).
      - name: Corrigir SPA routing (404 → index)
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4